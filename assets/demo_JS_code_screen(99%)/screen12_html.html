<div class="phone-container">
    <header class="app-header auth-header">
        <div class="logo-area" data-id="1">
            <img src="logo-icon.png" alt="Icon">
            <span class="logo-text">SafeMove HaNoi</span>
        </div>
    </header>

    <main class="scrollable-content signup-page">
        <div class="welcome-section">
            <p class="sub-greeting" data-id="2">Bắt đầu cuộc sống thể thao an toàn và thoải mái từ hôm nay</p>
            <h1 class="main-greeting" data-id="3">Đăng ký</h1>
        </div>

        <div class="auth-card signup-card">
            <form id="signup-form" onsubmit="return false;">
                
                <div class="input-group">
                    <label class="input-label">Họ và tên</label>
                    <input type="text" id="reg-name" class="auth-input no-icon" placeholder="Ví dụ: Nguyễn Văn A" data-id="4">
                    <span class="error-text" id="name-error"></span>
                </div>

                <div class="input-group">
                    <label class="input-label">Email</label>
                    <input type="email" id="reg-email" class="auth-input no-icon" placeholder="username@email.com" data-id="5">
                    <span class="error-text" id="email-error"></span>
                </div>

                <div class="input-group">
                    <label class="input-label">Mật khẩu</label>
                    <input type="password" id="reg-password" class="auth-input no-icon" placeholder="8-16 ký tự chữ và số" data-id="6">
                    <span class="error-text" id="password-error"></span>
                </div>

                <button type="button" class="btn-primary-auth" data-id="7">
                    Tạo tài khoản
                </button>
            </form>

            <div class="login-prompt">
                <span class="prompt-text" data-id="8">Bạn đã có tài khoản?</span>
                <a href="#" class="login-link" data-id="9">Đăng nhập</a>
            </div>

            <div class="social-divider">
                <span>Hoặc</span>
            </div>

            <div class="social-auth-group">
                <button class="btn-social google" data-id="10">
                    <img src="google-icon.png" alt="G"> Đăng ký bằng Google
                </button>
                <button class="btn-social facebook" data-id="11">
                    <img src="fb-icon.png" alt="F"> Đăng ký bằng Facebook
                </button>
                <button class="btn-social apple" data-id="12">
                    <img src="apple-icon.png" alt="A"> Đăng ký bằng Apple
                </button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" data-id="13">🏠<span class="nav-label">Trang chủ</span></a>
        <a href="#" class="nav-item" data-id="14">🔍<span class="nav-label">Tìm kiếm</span></a>
        <a href="#" class="nav-item" data-id="15">🏃<span class="nav-label">Lộ trình</span></a>
        <a href="#" class="nav-item" data-id="16">👤<span class="nav-label">Hồ sơ</span></a>
    </nav>
</div>
