<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeMove HaNoi - Content Moderation</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <header class="top-nav">
        <button id="btnBack" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> ダッシュボード
        </button>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Title & Description -->
        <h1 class="page-title">不適切なコメント管理</h1>
        <p class="page-desc">コミュニティの安全を守るため、報告された違反コメントの確認と処置を行ってください。</p>

        <!-- Filter Area -->
        <div class="filter-section">
            <h2 class="filter-label">場所でフィルタ</h2>
            <div class="filter-chips" id="locationFilters">
                <button class="chip active">すべて</button>
                <button class="chip">バックタオ公園</button>
                <button class="chip">ホアンキエム湖</button>
                <button class="chip">タイ湖周辺</button>
            </div>

            <h2 class="filter-label" style="margin-top: 16px;">ステータス</h2>
            <div class="filter-checkboxes">
                <label class="checkbox-label">
                    <input type="checkbox" id="chkUnprocessed" checked> 
                    <span class="checkmark"></span>
                    未処理
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chkDeleted"> 
                    <span class="checkmark"></span>
                    削除済み
                </label>
            </div>
        </div>

        <!-- Comment List Area -->
        <div class="comment-list">
            
            <!-- Comment Group 1: Bach Thao Park -->
            <div class="location-group">
                <h3 class="location-header"><i class="fa-solid fa-location-dot"></i> バックタオ公園</h3>
                
                <div class="comment-card">
                    <img src="https://images.unsplash.com/photo-1542272201-b1ca555f8505?auto=format&fit=crop&w=400&q=80" alt="Bach Thao Park" class="card-img">
                    <div class="card-body">
                        <div class="user-info">
                            <div class="user-profile">
                                <img src="https://i.pravatar.cc/100?img=12" alt="Avatar" class="avatar">
                                <span class="user-id">ユーザーID: A9283</span>
                            </div>
                            <span class="violation-badge">違反回数: 3回</span>
                        </div>
                        <p class="comment-text">「ここでのランニングは道が狭すぎて、歩行者が邪魔です。どいてほしい。」</p>
                        <div class="meta-info">
                            <span class="meta-item"><i class="fa-regular fa-calendar"></i> 2024/05/20 14:30</span>
                            <span class="meta-item"><i class="fa-solid fa-folder"></i> バックタオ公園</span>
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-delete">削除</button>
                            <button class="btn btn-restore">復元</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Comment Group 2: Hoan Kiem Lake -->
            <div class="location-group">
                <h3 class="location-header"><i class="fa-solid fa-location-dot"></i> ホアンキエム湖</h3>
                
                <div class="comment-card">
                    <img src="https://images.unsplash.com/photo-1559592413-7cea4ee303e1?auto=format&fit=crop&w=400&q=80" alt="Hoan Kiem Lake" class="card-img">
                    <div class="card-body">
                        <div class="user-info">
                            <div class="user-profile">
                                <img src="https://i.pravatar.cc/100?img=33" alt="Avatar" class="avatar">
                                <span class="user-id">ユーザーID: K7731</span>
                            </div>
                            <span class="violation-badge">違反回数: 2回</span>
                        </div>
                        <p class="comment-text">「ゴミが多すぎます。掃除してください。」<br><span style="color: #666; font-size: 12px;">(スパム報告: 重複投稿)</span></p>
                        <div class="meta-info">
                            <span class="meta-item"><i class="fa-regular fa-calendar"></i> 2024/05/20 10:20</span>
                            <span class="meta-item"><i class="fa-solid fa-folder"></i> ホアンキエム湖</span>
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-delete">削除</button>
                            <button class="btn btn-restore">復元</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
